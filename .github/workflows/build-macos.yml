name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS app bundle
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name douban_record_export_mac \
            --distpath dist_mac \
            --workpath build_mac \
            app.py

      - name: Package app bundle
        run: |
          mkdir -p release
          cp MAC_README.txt release/MAC_README.txt
          ditto -c -k --sequesterRsrc --keepParent "dist_mac/douban_record_export_mac.app" "release/douban_record_export_mac-${{ github.ref_name }}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: douban-record-export-macos-${{ github.ref_name }}
          path: |
            release/douban_record_export_mac-${{ github.ref_name }}.zip
            release/MAC_README.txt
          retention-days: 30

      - name: Publish release asset on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/douban_record_export_mac-${{ github.ref_name }}.zip
          generate_release_notes: true
